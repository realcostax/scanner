<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barcode Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a; --surface:#141414; --border:#2a2a2a; --accent:#00e5a0; --accent-dim:rgba(0,229,160,0.12); --text:#f0f0f0; --muted:#666; --font:'DM Mono','Courier New',monospace; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
  header { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:13px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-weight:400; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
  .dot.active { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  #cam-wrap { position:relative; width:100%; background:#000; aspect-ratio:4/3; overflow:hidden; }
  #video { width:100%; height:100%; object-fit:cover; }
  #canvas { display:none; }
  .shade { position:absolute; inset:0; background:rgba(0,0,0,0.45); }
  .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .frame { width:60%; aspect-ratio:1; position:relative; }
  .corner { position:absolute; width:20px; height:20px; border-color:var(--accent); border-style:solid; }
  .tl { top:0; left:0; border-width:2px 0 0 2px; }
  .tr { top:0; right:0; border-width:2px 2px 0 0; }
  .bl { bottom:0; left:0; border-width:0 0 2px 2px; }
  .br { bottom:0; right:0; border-width:0 2px 2px 0; }
  .scan-line { position:absolute; left:5%; right:5%; height:1px; background:var(--accent); box-shadow:0 0 6px var(--accent); display:none; animation:sweep 2s ease-in-out infinite; }
  .scanning .scan-line { display:block; }
  @keyframes sweep { 0%{top:10%} 100%{top:90%} }
  .placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
  .placeholder svg { opacity:0.2; }
  .placeholder p { font-size:12px; color:var(--muted); letter-spacing:0.08em; }
  .status { padding:10px 20px; font-size:11px; letter-spacing:0.08em; color:var(--muted); border-bottom:1px solid var(--border); min-height:38px; display:flex; align-items:center; }
  .status.ok { color:var(--accent); }
  .controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .controls button { background:var(--surface); border:none; color:var(--text); padding:14px 8px; font-family:var(--font); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:background 0.15s; }
  .controls button:active { background:var(--accent-dim); color:var(--accent); }
  .controls button:disabled { color:var(--muted); cursor:not-allowed; }
  .controls button.go { color:var(--accent); }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .stat { background:var(--surface); padding:14px 20px; }
  .stat-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .stat-val { font-size:28px; color:var(--text); }
  #log { overflow-y:auto; max-height:280px; }
  .log-empty { padding:32px 20px; font-size:12px; color:var(--muted); letter-spacing:0.08em; text-align:center; }
  .log-item { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:flex-start; animation:fadein 0.3s ease; }
  @keyframes fadein { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .log-item.new { background:var(--accent-dim); }
  .log-num { font-size:11px; color:var(--muted); min-width:24px; padding-top:2px; }
  .log-body { flex:1; min-width:0; }
  .log-data { font-size:13px; color:var(--text); word-break:break-all; margin-bottom:3px; }
  .log-sub { font-size:10px; color:var(--muted); letter-spacing:0.06em; }
  .log-type { display:inline-block; padding:1px 6px; border:1px solid var(--accent); border-radius:3px; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; margin-right:6px; color:var(--accent); opacity:0.7; }
  .export-wrap { padding:16px 20px; border-top:1px solid var(--border); }
  #export-btn { width:100%; padding:14px; background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:var(--font); font-size:12px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:background 0.15s; }
  #export-btn:active { background:var(--accent); color:#000; }
  #export-btn:disabled { border-color:var(--border); color:var(--muted); cursor:not-allowed; background:transparent; }
</style>
</head>
<body>
<header>
  <h1>/ barcode scanner</h1>
  <div class="dot" id="dot"></div>
</header>

<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="shade" id="shade"></div>
  <div class="overlay">
    <div class="frame" id="frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="placeholder" id="ph">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="14" width="8" height="20" rx="1" fill="white"/>
      <rect x="14" y="10" width="4" height="28" rx="1" fill="white"/>
      <rect x="20" y="14" width="6" height="20" rx="1" fill="white"/>
      <rect x="28" y="10" width="4" height="28" rx="1" fill="white"/>
      <rect x="34" y="14" width="10" height="20" rx="1" fill="white"/>
    </svg>
    <p>tap start to activate camera</p>
  </div>
</div>

<div class="status" id="status">ready</div>
<div class="controls">
  <button class="go" id="start-btn" onclick="startCam()">start</button>
  <button id="stop-btn" disabled onclick="stopCam()">stop</button>
  <button onclick="clearAll()">clear</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">scans</div><div class="stat-val" id="total">0</div></div>
  <div class="stat"><div class="stat-label">unique</div><div class="stat-val" id="unique">0</div></div>
</div>
<div id="log"><div class="log-empty">no scans yet</div></div>
<div class="export-wrap">
  <button id="export-btn" disabled onclick="exportXlsx()">export to excel (.xlsx)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let stream=null,ticker=null,scans=[],lastSeen={};
const DEBOUNCE=3000;
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

function setStatus(msg,ok){const el=document.getElementById('status');el.textContent=msg;el.className='status'+(ok?' ok':'');}

async function startCam(){
  try{
    setStatus('requesting camera…');
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:960}}});
    video.srcObject=stream;await video.play();
    document.getElementById('ph').style.display='none';
    document.getElementById('shade').style.background='rgba(0,0,0,0.25)';
    document.getElementById('frame').classList.add('scanning');
    document.getElementById('dot').classList.add('active');
    document.getElementById('start-btn').disabled=true;
    document.getElementById('stop-btn').disabled=false;
    setStatus('scanning — point at a barcode or QR code',true);
    ticker=setInterval(scanFrame,500);
  }catch(e){setStatus('camera access denied — check browser permissions');}
}

function stopCam(){
  clearInterval(ticker);
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  video.srcObject=null;
  document.getElementById('ph').style.display='flex';
  document.getElementById('frame').classList.remove('scanning');
  document.getElementById('dot').classList.remove('active');
  document.getElementById('start-btn').disabled=false;
  document.getElementById('stop-btn').disabled=true;
  setStatus('stopped');
}

function scanFrame(){
  if(!stream||video.readyState<2)return;
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const qr=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
  if(qr&&qr.data){record(qr.data,'QR Code');return;}
  Quagga.decodeSingle({decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader']},locate:true,src:canvas.toDataURL()},r=>{
    if(r&&r.codeResult&&r.codeResult.code)record(r.codeResult.code,r.codeResult.format.toUpperCase().replace(/_/g,'-'));
  });
}

function record(data,type){
  const now=Date.now();
  if(lastSeen[data]&&now-lastSeen[data]<DEBOUNCE)return;
  lastSeen[data]=now;
  const e={n:scans.length+1,ts:new Date().toLocaleString(),data,type};
  scans.push(e);addRow(e);updateStats();
  setStatus('scanned: '+data,true);
}

function addRow(e){
  const log=document.getElementById('log');
  if(log.querySelector('.log-empty'))log.innerHTML='';
  const d=document.createElement('div');
  d.className='log-item new';
  d.innerHTML=`<div class="log-num">${String(e.n).padStart(2,'0')}</div><div class="log-body"><div class="log-data">${esc(e.data)}</div><div class="log-sub"><span class="log-type">${esc(e.type)}</span>${e.ts}</div></div>`;
  log.insertBefore(d,log.firstChild);
  setTimeout(()=>d.classList.remove('new'),600);
}

function updateStats(){
  document.getElementById('total').textContent=scans.length;
  document.getElementById('unique').textContent=new Set(scans.map(s=>s.data)).size;
  document.getElementById('export-btn').disabled=scans.length===0;
}

function clearAll(){
  scans=[];lastSeen={};
  document.getElementById('log').innerHTML='<div class="log-empty">no scans yet</div>';
  updateStats();
  setStatus(stream?'scanning — point at a barcode or QR code':'ready',!!stream);
}

function exportXlsx(){
  const wb=XLSX.utils.book_new();
  const rows=[['#','Timestamp','Barcode Data','Type','Notes']];
  scans.forEach(s=>rows.push([s.n,s.ts,s.data,s.type,'']));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:22},{wch:38},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Scan Records');
  const sum=[['Total scans',scans.length],['Unique codes',new Set(scans.map(s=>s.data)).size],['Exported',new Date().toLocaleString()]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'Summary');
  XLSX.writeFile(wb,'scans_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
